name: crawl-and-detect
# Free on PUBLIC repos (unlimited Actions minutes). The regular DB write also
# doubles as the Supabase keep-alive that prevents the 7-day free-tier pause.
#
# Two lanes per retailer, in one parallel job each:
#  1. refresh - bulk listing/API pass (48-200 products per request) that
#     covers whole catalogues in minutes-to-an-hour and only writes a price
#     snapshot when a price actually changed.
#  2. crawl   - small product-page batch for fields listings don't carry
#     (GTIN on Target, was-price on BigW/Officeworks).
# Politeness is per-retailer and unchanged: one request at a time, 2.5s
# delays on Akamai-fronted sites; Blocked exceptions end a lane early and
# the next cycle resumes where it left off.

on:
  schedule:
    - cron: "0 * * * *"    # hourly (UTC, best-effort). Was every 30 min -
                            # halved 2026-07-12 as part of staying inside
                            # Supabase's free-tier egress quota; deal
                            # detection latency is now <= ~1h, still fine.
  workflow_dispatch: {}         # manual "Run workflow" button

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 110
    strategy:
      fail-fast: false
      matrix:
        include:
          - retailer: officeworks
            budget: 900
          - retailer: bigw
            budget: 1600
          - retailer: kmart
            budget: 1400
          - retailer: target
            budget: 700
          - retailer: jbhifi
            budget: 100      # 100 pages x 250 = the full reachable catalogue
          - retailer: goodguys
            budget: 50        # no bulk listing API - refresh lane is a no-op,
                               # all coverage comes from the crawl (queue) lane
            crawl_batch: 500  # no bot protection seen - safe to crawl the
                               # 8.6k-URL queue faster than the 40/run default
          - retailer: myer
            budget: 50        # refresh lane is a no-op (no bulk listing API -
                               # Salesforce Commerce Cloud storefront, JSON-LD
                               # product pages only); all coverage via the
                               # crawl (queue) lane
            crawl_batch: 1000 # 154k-URL queue seeded from sitemap_20251*.xml.gz;
                               # no bot protection seen on plain requests (same
                               # profile as supercheap). Was raised 1000->2400
                               # on 17 July to speed up the image_url backfill,
                               # but reverted same day (18 July ~00:00 UTC):
                               # actual per-item time ran ~2-3x the assumed
                               # 1.5s delay floor, so 2400 took 1.5-2h instead
                               # of the estimated 60min - every hourly cron
                               # tick then queued a new run that cancelled the
                               # still-running previous one (concurrency group
                               # crawl-myer, cancel-in-progress: false only
                               # protects against 1 overlap, not a job that
                               # consistently overruns the schedule interval).
                               # Net effect was *zero* completed myer crawls
                               # for 4+ consecutive hourly runs and knock-on
                               # `detect` step failures (statement_timeout on
                               # the deals insert, likely contention from the
                               # pile-up). 1000 is the last value confirmed to
                               # reliably complete inside an hour.
          - retailer: supercheap
            budget: 50        # refresh lane is a no-op (no compliant bulk
                               # listing; robots.txt disallows pagination params)
            crawl_batch: 1000 # full ~518k-URL catalogue (queued via a one-off
                               # manual `index supercheap`, like Good Guys's
                               # initial seed); no bot protection seen on
                               # plain requests, full sweep takes ~11 days
          - retailer: sephora
            budget: 25        # 16 pages x 500 = full AU catalogue via the
                               # v2.6 JSON API, plus headroom
          - retailer: chemistwarehouse
            budget: 50        # refresh lane is a no-op (robots.txt disallows
                               # /api/, category pages aren't SSR'd) - all
                               # coverage via the crawl (queue) lane
            crawl_batch: 500  # ~26k-URL queue seeded from products.xml;
                               # full sweep in ~26h of half-hourly runs
    concurrency:
      group: crawl-${{ matrix.retailer }}
      cancel-in-progress: false
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}   # Supabase connection string
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}  # item-watch pings fire from the
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}      # refresh/crawl lanes (send_item_watch
                                                   # + the jbhifi RAM watch, which silently
                                                   # never fired from CI before these were here)
      PROXY_URL: ${{ secrets.PROXY_URL }}         # residential proxy (Webshare, 1GB/mo) - bigw only;
                                                   # direct requests to bigw.com.au are blocked outright.
                                                   # kmart/target/sephora don't use it: proxy doesn't
                                                   # defeat Kmart/Target's Akamai JS-challenge tier, and
                                                   # Sephora already works direct. bigw.py self-caps
                                                   # bytes-through-proxy per month so it can't exceed the plan.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Big W cadence gate
        id: bigw_cadence
        run: |
          if [[ "${{ matrix.retailer }}" != "bigw" || "${{ github.event_name }}" != "schedule" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif (( 10#$(date -u +%H) % 3 == 0 )); then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping Big W this hour; its residential-proxy refresh runs every three hours."
          fi
      # First run only: uncomment to load full catalogues into the queue.
      # - run: python run.py index all
      - name: Bulk price refresh (${{ matrix.retailer }})
        if: matrix.retailer != 'bigw' || steps.bigw_cadence.outputs.run == 'true'
        run: python run.py refresh ${{ matrix.retailer }} --budget ${{ matrix.budget }} || true
      - name: Product-page enrichment (${{ matrix.retailer }})
        if: matrix.retailer != 'bigw' || steps.bigw_cadence.outputs.run == 'true'
        run: python run.py crawl ${{ matrix.retailer }} --batch ${{ matrix.crawl_batch || 40 }} || true

  detect:
    needs: crawl
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}   # optional: deal pings
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}           # optional: price-watch emails
      RESEND_FROM: ${{ secrets.RESEND_FROM }}                 # e.g. alerts@yourdomain.com
      SITE_URL: ${{ secrets.SITE_URL }}                       # for unsubscribe links; defaults to the current Vercel URL
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Detect price drops
        run: python run.py detect
