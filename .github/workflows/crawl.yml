name: refresh-and-detect

# The hourly path contains only catalogue/listing refreshes. Product-page
# enrichment lives in enrich.yml on a three-hour cadence, so Myer and
# Supercheap can no longer hold detection behind 60-90 minute queue crawls.
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    strategy:
      fail-fast: false
      matrix:
        include:
          - retailer: officeworks
            budget: 900
          - retailer: bigw
            budget: 1600
          - retailer: kmart
            budget: 1400
          - retailer: target
            budget: 700
          - retailer: jbhifi
            budget: 100
          - retailer: sephora
            budget: 25
    concurrency:
      group: refresh-${{ matrix.retailer }}
      cancel-in-progress: false
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      PROXY_URL: ${{ secrets.PROXY_URL }}
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/database-tunnel
        with:
          database-url: ${{ secrets.DATABASE_URL }}
          ssh-private-key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          ssh-known-hosts: ${{ secrets.OCI_SSH_KNOWN_HOSTS }}
          ssh-host: ${{ vars.OCI_SSH_HOST }}
          ssh-user: ${{ vars.OCI_SSH_USER }}
          database-host: ${{ vars.OCI_DB_PRIVATE_HOST }}
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Big W cadence gate
        id: bigw_cadence
        shell: bash
        run: |
          if [[ "${{ matrix.retailer }}" != "bigw" || "${{ github.event_name }}" != "schedule" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif (( 10#$(date -u +%H) % 6 != 0 )); then
            echo "run=false" >> "$GITHUB_OUTPUT"
          elif python scripts/heartbeat_fresh.py bigw_local_heartbeat 86400; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "The home-IP Big W sweep is healthy; skipping proxy fallback."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Big W heartbeat is stale; running the proxy fallback."
          fi
      - name: Kmart cadence gate
        id: kmart_cadence
        shell: bash
        run: |
          if [[ "${{ matrix.retailer }}" != "kmart" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif python scripts/heartbeat_fresh.py kmart_vm_heartbeat 5400; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "The OCI Kmart sweep is healthy; skipping CI fallback."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Kmart heartbeat is stale; running the CI fallback."
          fi
      - name: Refresh ${{ matrix.retailer }}
        if: (matrix.retailer != 'bigw' || steps.bigw_cadence.outputs.run == 'true') && (matrix.retailer != 'kmart' || steps.kmart_cadence.outputs.run == 'true')
        run: python run.py refresh ${{ matrix.retailer }} --budget ${{ matrix.budget }}

  # Embeddings are independent of both refresh and detection.
  embed:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: embed
      cancel-in-progress: false
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/database-tunnel
        with:
          database-url: ${{ secrets.DATABASE_URL }}
          ssh-private-key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          ssh-known-hosts: ${{ secrets.OCI_SSH_KNOWN_HOSTS }}
          ssh-host: ${{ vars.OCI_SSH_HOST }}
          ssh-user: ${{ vars.OCI_SSH_USER }}
          database-host: ${{ vars.OCI_DB_PRIVATE_HOST }}
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt -r requirements-embed.txt
      - run: python embed_products.py --budget 20000

  detect:
    needs: refresh
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: detect
      cancel-in-progress: false
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM: ${{ secrets.RESEND_FROM }}
      SITE_URL: ${{ secrets.SITE_URL }}
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/database-tunnel
        with:
          database-url: ${{ secrets.DATABASE_URL }}
          ssh-private-key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          ssh-known-hosts: ${{ secrets.OCI_SSH_KNOWN_HOSTS }}
          ssh-host: ${{ vars.OCI_SSH_HOST }}
          ssh-user: ${{ vars.OCI_SSH_USER }}
          database-host: ${{ vars.OCI_DB_PRIVATE_HOST }}
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Install dependencies
        id: dependencies
        run: pip install -r requirements.txt
      - name: Detect price drops
        run: python run.py detect
      - name: Email crawler health alerts
        if: always() && steps.dependencies.outcome == 'success'
        env:
          ADMIN_ALERT_EMAIL: admin@dealwatch.com.au
        run: python health_alerts.py
