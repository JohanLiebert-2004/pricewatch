<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sample B — Dark trading desk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Archivo:wght@500;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{margin:0;background:#07090b;color:#d8e0da;font-family:"IBM Plex Mono",monospace;font-size:13px}
.wrap{max-width:1080px;margin:0 auto;padding:0 20px}
.top{border-bottom:1px solid #1a2620;position:sticky;top:0;background:rgba(7,9,11,.92);backdrop-filter:blur(8px);z-index:9}
.toprow{display:flex;align-items:center;justify-content:space-between;height:54px}
.logo{font-family:Archivo,sans-serif;font-weight:900;font-size:17px;letter-spacing:.02em;color:#fff}
.logo b{color:#22ff88}
.live{color:#22ff88;font-size:11px;letter-spacing:.2em}
.live::before{content:"● ";animation:bl 1.4s infinite}
@keyframes bl{50%{opacity:.25}}
.hero{padding:36px 0 8px}
h1{font-family:Archivo,sans-serif;font-weight:900;font-size:clamp(28px,4.4vw,46px);
  letter-spacing:-.01em;margin:0;color:#fff;text-transform:uppercase}
h1 span{color:#22ff88;text-shadow:0 0 24px rgba(34,255,136,.45)}
.sub{color:#5f7a6c;margin:10px 0 0}
.ticker{display:flex;gap:28px;margin:22px 0 0;padding:14px 0;border-top:1px solid #1a2620;
  border-bottom:1px solid #1a2620;flex-wrap:wrap}
.tick b{color:#22ff88;font-size:18px;display:block}
.tick span{color:#43584c;font-size:10px;letter-spacing:.18em;text-transform:uppercase}
.controls{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0;align-items:center}
.controls button,.controls select{font:inherit;font-size:11px;letter-spacing:.08em;
  padding:7px 13px;background:transparent;border:1px solid #223129;color:#7d9c8b;
  cursor:pointer;text-transform:uppercase}
.controls .on{border-color:#22ff88;color:#22ff88;box-shadow:0 0 12px rgba(34,255,136,.18) inset}
.controls select{color:#d8e0da}
.head,.r{display:grid;grid-template-columns:86px 52px 1fr 110px 110px 100px;gap:14px;align-items:center}
.head{color:#43584c;font-size:10px;letter-spacing:.2em;text-transform:uppercase;
  padding:8px 10px;border-bottom:1px solid #1a2620}
.r{padding:9px 10px;border-bottom:1px solid #10160f;text-decoration:none;color:inherit;transition:background .1s}
.r:hover{background:#0d1410}
.pct{font-weight:700;font-size:17px;color:#22ff88}
.pct.err{color:#ff4d6d;text-shadow:0 0 16px rgba(255,77,109,.4)}
.im{width:44px;height:44px;background:#fff;border-radius:4px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.im img{width:100%;height:100%;object-fit:contain;padding:2px}
.im span{color:#999;font-weight:700}
.nm{color:#d8e0da;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.st{color:#5f7a6c;font-size:11px;text-transform:uppercase;letter-spacing:.1em}
.px{text-align:right;font-weight:600;color:#fff;font-size:14px}
.rf{text-align:right;color:#43584c;text-decoration:line-through}
.note{text-align:center;color:#43584c;padding:36px 0 50px;font-size:11px;letter-spacing:.15em}
@media(max-width:720px){.head{display:none}.r{grid-template-columns:60px 44px 1fr 84px}.rf,.st{display:none}}
</style>
</head>
<body>
<div class="top"><div class="wrap toprow">
  <div class="logo">UNDER<b>PRICED_</b></div><div class="live">LIVE FEED · SAMPLE B</div>
</div></div>
<header class="hero wrap">
  <h1>Pricing errors, <span>tracked live</span></h1>
  <p class="sub">// 5 retailers · scanned around the clock · deepest cuts first</p>
  <div class="ticker">
    <div class="tick"><b id="t1">—</b><span>deals ≥50%</span></div>
    <div class="tick"><b>5</b><span>stores</span></div>
    <div class="tick"><b>24/7</b><span>uptime</span></div>
  </div>
  <div class="controls">
    <button class="on">ALL</button><button>KMART</button><button>BIGW</button>
    <button>OFFICEWORKS</button><button>TARGET</button><button>JBHIFI</button>
    <select><option>SORT: DEPTH</option><option>PRICE ↑</option><option>PRICE ↓</option><option>NEWEST</option></select>
  </div>
</header>
<main class="wrap">
  <div class="head"><div>DISC</div><div></div><div>ITEM</div><div>STORE</div>
    <div style="text-align:right">NOW</div><div style="text-align:right">REF</div></div>
  <div id="list"></div>
  <div class="note">SAMPLE B — DARK TRADING DESK</div>
</main>
<script>
const K="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVrbGZnd2FseWZ1Z3BlaWVlcXd6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxNDc1NTcsImV4cCI6MjA5ODcyMzU1N30.Y-q-s49eP67iHuQIysRb7Apl5vLA4u2C6fZYCdS7Ijg";
const money=n=>"$"+Number(n).toFixed(2);
const LAB={kmart:"Kmart",bigw:"Big W",officeworks:"Officeworks",target:"Target",jbhifi:"JB Hi-Fi"};
const esc=s=>String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const t=u=>u.includes("cdn.shopify.com")?u+(u.includes("?")?"&":"?")+"width=200"
  :u.includes("JPEG_1000x1000")?u.replace("JPEG_1000x1000","JPEG_300x300")
  :u.includes("assets.kmart.com.au")?u.replace(/width:\d+,height:\d+/,"width:200,height:250"):u;
const B="https://eklfgwalyfugpeieeqwz.supabase.co/rest/v1/discount_feed";
const H={apikey:K,Authorization:"Bearer "+K};
fetch(B+"?select=sku&pct_off=gte.50&limit=1",{headers:{...H,Prefer:"count=exact"}})
  .then(r=>{const n=(r.headers.get("content-range")||"").split("/")[1];
    if(n)document.getElementById("t1").textContent=n;});
fetch(B+"?select=*&pct_off=gte.30&order=pct_off.desc,reference_price.desc&limit=40",{headers:H})
  .then(r=>r.json()).then(rows=>{
  document.getElementById("list").innerHTML=rows.map(d=>`
    <a class="r" href="${esc(d.url)}" target="_blank" rel="noopener">
      <div class="pct ${d.pct_off>=80?"err":""}">-${d.pct_off}%</div>
      <div class="im">${d.image_url?`<img src="${esc(t(d.image_url))}" loading="lazy" alt=""
        onerror="this.outerHTML='<span>${(LAB[d.retailer]||"?")[0]}</span>'">`
        :`<span>${(LAB[d.retailer]||"?")[0]}</span>`}</div>
      <div class="nm">${esc(d.title)}</div>
      <div class="st">${LAB[d.retailer]||d.retailer}</div>
      <div class="px">${money(d.price)}</div>
      <div class="rf">${money(d.reference_price)}</div>
    </a>`).join("");
});
</script>
</body>
</html>
