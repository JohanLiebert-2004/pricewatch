<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sample C — Warm premium editorial</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{margin:0;background:#faf6ef;color:#221d15;font-family:Outfit,system-ui,sans-serif;font-size:14.5px}
.wrap{max-width:960px;margin:0 auto;padding:0 24px}
.top{border-bottom:1px solid #e6decf;position:sticky;top:0;background:rgba(250,246,239,.9);backdrop-filter:blur(10px);z-index:9}
.toprow{display:flex;align-items:center;justify-content:space-between;height:60px}
.logo{font-family:"Instrument Serif",serif;font-size:24px;letter-spacing:-.01em}
.logo i{color:#b0803a}
.tag{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#8f8064}
.hero{padding:56px 0 36px;text-align:center;border-bottom:1px solid #e6decf}
h1{font-family:"Instrument Serif",serif;font-weight:400;font-size:clamp(38px,6vw,64px);
  line-height:1.04;margin:0;letter-spacing:-.015em}
h1 i{color:#b0803a}
.sub{color:#7a6f5b;margin:16px auto 0;max-width:480px;font-size:15.5px;line-height:1.7}
.rule{width:52px;height:2px;background:#b0803a;margin:26px auto 0}
.controls{display:flex;gap:10px;flex-wrap:wrap;margin:30px 0 6px;justify-content:center;align-items:center}
.controls button,.controls select{font:inherit;font-size:12.5px;font-weight:500;
  padding:8px 18px;border-radius:99px;border:1px solid #d9cfb9;background:transparent;
  cursor:pointer;color:#7a6f5b}
.controls .on{background:#221d15;color:#faf6ef;border-color:#221d15}
.item{display:grid;grid-template-columns:110px 1fr auto;gap:26px;align-items:center;
  padding:26px 0;border-bottom:1px solid #e6decf;text-decoration:none;color:inherit}
.item:hover .nm{color:#b0803a}
.ph{width:110px;height:110px;background:#fff;border:1px solid #e6decf;border-radius:6px;
  display:flex;align-items:center;justify-content:center;overflow:hidden}
.ph img{max-width:88%;max-height:88%;object-fit:contain}
.ph span{font-family:"Instrument Serif",serif;font-size:40px;color:#d9cfb9}
.kick{font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:#b0803a;font-weight:600}
.nm{font-family:"Instrument Serif",serif;font-size:22px;line-height:1.25;margin:6px 0 8px;transition:color .15s}
.by{font-size:12px;color:#8f8064}
.px{text-align:right;white-space:nowrap}
.now{font-family:"Instrument Serif",serif;font-size:30px}
.was{color:#b3a58a;text-decoration:line-through;font-size:14px;margin-top:2px}
.off{display:inline-block;margin-top:8px;font-size:11px;letter-spacing:.14em;font-weight:600;
  color:#b0803a;border:1px solid #d9cfb9;border-radius:99px;padding:4px 12px;text-transform:uppercase}
.note{text-align:center;color:#b3a58a;padding:44px 0 56px;font-size:12px;letter-spacing:.12em;text-transform:uppercase}
@media(max-width:620px){.item{grid-template-columns:78px 1fr}.px{grid-column:2;text-align:left}.ph{width:78px;height:78px}}
</style>
</head>
<body>
<div class="top"><div class="wrap toprow">
  <div class="logo">Under<i>priced</i></div><div class="tag">Sample C · editorial</div>
</div></div>
<header class="hero wrap">
  <h1>The art of paying<br><i>far too little.</i></h1>
  <p class="sub">Every price at five Australian retailers, watched around the clock.
    These are today's deepest markdowns — found before anyone else noticed.</p>
  <div class="rule"></div>
  <div class="controls">
    <button class="on">All stores</button><button>Kmart</button><button>Big W</button>
    <button>Officeworks</button><button>Target</button><button>JB Hi-Fi</button>
    <select><option>Deepest first</option><option>Price: low to high</option>
      <option>Price: high to low</option><option>Freshly dropped</option></select>
  </div>
</header>
<main class="wrap"><div id="list"></div>
<div class="note">Sample C — warm premium editorial</div></main>
<script>
const K="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVrbGZnd2FseWZ1Z3BlaWVlcXd6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxNDc1NTcsImV4cCI6MjA5ODcyMzU1N30.Y-q-s49eP67iHuQIysRb7Apl5vLA4u2C6fZYCdS7Ijg";
const money=n=>"$"+Number(n).toFixed(2).replace(/\.00$/,"");
const LAB={kmart:"Kmart",bigw:"Big W",officeworks:"Officeworks",target:"Target",jbhifi:"JB Hi-Fi"};
const esc=s=>String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const t=u=>u.includes("cdn.shopify.com")?u+(u.includes("?")?"&":"?")+"width=300"
  :u.includes("JPEG_1000x1000")?u.replace("JPEG_1000x1000","JPEG_300x300")
  :u.includes("assets.kmart.com.au")?u.replace(/width:\d+,height:\d+/,"width:300,height:375"):u;
fetch("https://eklfgwalyfugpeieeqwz.supabase.co/rest/v1/discount_feed?select=*&pct_off=gte.40&order=pct_off.desc,reference_price.desc&limit=18",
  {headers:{apikey:K,Authorization:"Bearer "+K}}).then(r=>r.json()).then(rows=>{
  document.getElementById("list").innerHTML=rows.map(d=>`
    <a class="item" href="${esc(d.url)}" target="_blank" rel="noopener">
      <div class="ph">${d.image_url?`<img src="${esc(t(d.image_url))}" loading="lazy" alt=""
        onerror="this.outerHTML='<span>${(LAB[d.retailer]||"?")[0]}</span>'">`
        :`<span>${(LAB[d.retailer]||"?")[0]}</span>`}</div>
      <div>
        <div class="kick">${LAB[d.retailer]||d.retailer} · ${esc(d.category)}</div>
        <div class="nm">${esc(d.title)}</div>
        <div class="by">normally ${money(d.reference_price)}</div>
      </div>
      <div class="px">
        <div class="now">${money(d.price)}</div>
        <div class="off">${d.pct_off}% off</div>
      </div>
    </a>`).join("");
});
</script>
</body>
</html>
